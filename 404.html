  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Fraunces:ital,wght@0,400..600;1,400..600&family=Geist:wght@400;500&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f0e8d2;
      --bg-elev: #f6efdb;
      --bg-card: #e8e0c5;
      --ink: #3a2818;
      --ink-soft: #5a4632;
      --ink-mute: #8a7a5e;
      --rule: #cdc0a0;
      --rule-strong: #b8a988;
      --accent: #ec6478;
      --accent-soft: #f7d4dc;
      --accent-deep: #b13e58;
      --leaf-deep: #3d6b2c;

      --display: "Bricolage Grotesque", system-ui, sans-serif;
      --serif: "Fraunces", Georgia, serif;
      --sans: "Geist", "Inter", system-ui, -apple-system, sans-serif;
      --mono: "Geist Mono", ui-monospace, monospace;

      --r-md: 12px;
      --r-lg: 18px;
      --ease: cubic-bezier(.22,.61,.36,1);
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; }
    html { -webkit-font-smoothing: antialiased; }

    body {
      background: var(--bg); color: var(--ink);
      font-family: var(--sans); font-size: 15px; line-height: 1.6;
      min-height: 100vh;
      display: grid; place-items: center;
      padding: 32px;
    }

    body::before {
      content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 1;
      opacity: .35;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='2' seed='4'/><feColorMatrix values='0 0 0 0 0.55  0 0 0 0 0.42  0 0 0 0 0.22  0 0 0 0.07 0'/></filter><rect width='220' height='220' filter='url(%23n)'/></svg>");
      mix-blend-mode: multiply;
    }

    a { color: inherit; text-decoration: none; }

    .lost {
      position: relative; z-index: 2;
      max-width: 580px; text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 22px;
    }

    .eyebrow {
      font-family: var(--mono); font-size: 11px; font-weight: 500;
      letter-spacing: .26em; text-transform: uppercase;
      color: var(--accent-deep);
      margin: 0;
    }

    .heading {
      font-family: var(--display); font-weight: 600;
      font-size: clamp(44px, 7vw, 76px);
      line-height: .98; letter-spacing: -.025em;
      margin: 0;
    }

    .heading .em {
      font-family: var(--serif); font-style: italic; font-weight: 400;
      color: var(--accent-deep);
    }

    .lede {
      font-family: var(--serif); font-style: italic;
      font-size: clamp(17px, 1.5vw, 20px);
      color: var(--ink-soft);
      max-width: 38ch; margin: 0;
      line-height: 1.45;
    }

    .actions {
      display: flex; flex-wrap: wrap; gap: 12px; justify-content: center;
      margin-top: 6px;
    }

    .pill {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 20px;
      border-radius: 999px;
      font-family: var(--mono); font-size: 11.5px; font-weight: 500;
      letter-spacing: .18em; text-transform: uppercase;
      transition: background .2s var(--ease), border-color .2s var(--ease), transform .2s var(--ease), color .2s var(--ease);
    }
    .pill.primary {
      background: var(--ink); color: var(--bg);
      border: 1px solid var(--ink);
    }
    .pill.primary:hover {
      background: var(--accent-deep); border-color: var(--accent-deep);
      transform: translateY(-1px);
    }
    .pill.ghost {
      background: var(--bg-elev); color: var(--ink-soft);
      border: 1px solid var(--rule);
    }
    .pill.ghost:hover {
      background: var(--bg-card); border-color: var(--rule-strong);
      color: var(--ink);
      transform: translateY(-1px);
    }

    .meta {
      margin-top: 28px;
      font-family: var(--mono); font-size: 10.5px;
      letter-spacing: .14em; text-transform: uppercase;
      color: var(--ink-mute);
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>

  <main class="lost">
    <p class="eyebrow">404 · page not found</p>
    <h1 class="heading">This path doesn't <span class="em">grow here.</span></h1>
    <p class="lede">The page you were looking for isn't in this garden, but the rest is just through the gate.</p>
    <div class="actions">
      <a class="pill primary" href="/home.html">← back to my work</a>
      <a class="pill ghost" href="/">start at the garden gate</a>
    </div>
    <p class="meta">© 2026 Sakshi Shah</p>
  </main>

</body>
</html>
