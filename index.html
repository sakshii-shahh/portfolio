<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..700&family=Fraunces:ital,wght@0,400..600;1,400..600&family=Geist:wght@400;500&family=Geist+Mono&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f0e8d2;
    --ink:#3a2818;
    --ink-soft:#5a4632;
    --ink-mute:#8a7a5e;
    --leaf:#5e8a4f;
    --leaf-deep:#3d6b2c;
    --accent:#ec6478;
    --cream:#fbf6e5;
    --serif:'Fraunces',Georgia,serif;
    --display:'Bricolage Grotesque',system-ui,sans-serif;
    --mono:'Geist Mono',ui-monospace,monospace;
    --sans:'Geist','Inter',system-ui,-apple-system,sans-serif;
    --ease:cubic-bezier(.22,.61,.36,1);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:#cfe6e2; /* sky-tone fallback while SVG loads */
    color:var(--cream);
    font-family:var(--sans);
    overflow:hidden;
    height:100vh;
    position:relative;
  }

  /* FULL-BLEED illustration BG, sits inside .welcome wrapper, so absolute (not fixed) */
  .scene-bg{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover;
    object-position:center center;
    z-index:0;
    transform-origin:50% 50%;
    animation:gentleZoomIn 38s ease-in-out infinite alternate;
  }
  @keyframes gentleZoomIn{
    0%{transform:scale(1.0)} 100%{transform:scale(1.06)}
  }

  /* paper grain on top of illustration to keep watercolor feel */
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:5;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='2' seed='4'/><feColorMatrix values='0 0 0 0 0.55  0 0 0 0 0.42  0 0 0 0 0.22  0 0 0 0.05 0'/></filter><rect width='220' height='220' filter='url(%23n)'/></svg>");
    mix-blend-mode:multiply; opacity:.22;
  }

  /* WELCOME, wraps SVG + page so the entire scene transforms as one unit during exit */
  .welcome{
    position:relative;
    width:100vw; height:100vh;
    overflow:hidden;
  }

  /* "STEPPING INTO THE GARDEN" exit, 4 phases over 1.5s
     Phase 1 (0–200ms / 0–13.3%):    anticipation breath-in to scale .98
     Phase 2 (200–1200ms / 13.3–80%): dolly forward to scale 1.18, opacity 0, blur 6px
     Phase 3 (700–1500ms / 46.7–100%): cream wash blooms from click point (separate keyframes)
     Phase 4 (1500ms):                navigate */
  .welcome.exiting{
    animation:scene-step-inside 1500ms linear forwards;
    pointer-events:none;
  }
  @keyframes scene-step-inside{
    0%    { transform:scale(1);    opacity:1; filter:blur(0px); animation-timing-function:cubic-bezier(.4,0,.2,1); }
    13.3% { transform:scale(.98);  opacity:1; filter:blur(0px); animation-timing-function:cubic-bezier(.65,0,.35,1); }
    80%   { transform:scale(1.18); opacity:0; filter:blur(6px); }
    100%  { transform:scale(1.18); opacity:0; filter:blur(6px); }
  }
  /* Subtle button dim during Phase 1, signals click was registered */
  .welcome.exiting .cta{
    opacity:.65;
    transition:opacity 200ms cubic-bezier(.4,0,.2,1);
  }
  /* Freeze the ambient gentle zoom on the SVG during exit so only .welcome's scale drives motion */
  .welcome.exiting .scene-bg{
    animation-play-state:paused;
  }

  .page{
    position:relative; z-index:2;
    height:100%; width:100%;
    display:flex; flex-direction:column;
  }

  /* CREAM WASH, radial-gradient overlay that blooms from the click point, overlapping Phase 2 */
  .cream-wash{
    position:fixed; top:0; left:0;
    width:100vw; height:100vh;
    z-index:30;
    pointer-events:none;
    background:radial-gradient(circle, var(--bg) 0%, var(--bg) 70%, rgba(240,232,210,0) 100%);
    transform:scale(0);
    transform-origin:50% 50%;
    opacity:0;
  }
  .cream-wash.blooming{
    animation:wash-bloom 1500ms cubic-bezier(.22,.61,.36,1) forwards;
  }
  /* Stays invisible for first 700ms, then blooms scale 0→2.5 + opacity 0→1 over remaining 800ms */
  @keyframes wash-bloom{
    0%, 46.7% { transform:scale(0);   opacity:0; }
    100%      { transform:scale(2.5); opacity:1; }
  }

  /* WORDMARK, naked, just dot + name; no pill, no underline */
  .wordmark{
    position:fixed; top:30px; left:34px; z-index:7;
    display:inline-flex; align-items:center; gap:10px;
    font-family:var(--display);
    font-size:16px; font-weight:600;
    letter-spacing:-.005em;
    color:#3a2818;
    text-decoration:none;
    text-shadow:0 1px 2px rgba(255,255,255,.45);
    transition:color .2s var(--ease);
  }
  .wordmark:hover{ color:#1f1410; }
  .wordmark .dot{
    width:9px; height:9px; border-radius:50%;
    background:#ec6478;
    flex-shrink:0;
  }

  /* SKY ZONE, eyebrow + title + tagline, anchored to the bottom of the sky (hugs the horizon) */
  .top{
    flex:0 0 60vh;
    display:flex; flex-direction:column; align-items:center; justify-content:flex-end;
    gap:14px;
    padding:0 6vw 60px;
    text-align:center;
    color:#3a4a55;
    text-shadow:0 1px 2px rgba(255,255,255,.35), 0 2px 14px rgba(255,255,255,.18);
    position:relative;
  }
  .eyebrow{
    font-family:var(--mono);
    font-size:11px; letter-spacing:.32em;
    text-transform:uppercase;
    color:rgba(58,74,85,.62);
    margin:0;
    font-weight:500;
  }
  .title{
    font-family:var(--display);
    font-weight:500;
    font-size:clamp(30px,4.4vw,52px);
    line-height:1.04;
    letter-spacing:-.02em;
    margin:0;
    color:#3a4a55;
  }
  .title .serif{
    font-family:var(--serif);
    font-style:italic;
    font-weight:500;
    color:var(--accent);
  }

  /* GRASS ZONE, CTA + skip; anchored just below the horizon, in conversation with the tagline above */
  .bottom{
    flex:1;
    display:flex; flex-direction:column; align-items:center;
    padding:60px 6vw 0;
    text-align:center;
    color:var(--cream);
    text-shadow:0 1px 2px rgba(20,40,15,.28), 0 2px 14px rgba(20,40,15,.18);
    position:relative;
    z-index:3;
  }
  .sub{
    font-family:var(--serif);
    font-style:italic;
    font-weight:400;
    font-size:clamp(13.5px,1.3vw,16.5px);
    color:rgba(58,74,85,.78);
    line-height:1.5;
    margin:0 auto;
    max-width:42ch;
  }
  .cta-row{
    display:inline-flex; flex-direction:column; align-items:center; gap:10px;
  }
  .cta{
    background:var(--cream);
    color:var(--leaf-deep);
    border:none;
    font-family:var(--display);
    font-weight:600;
    font-size:14.5px;
    letter-spacing:.02em;
    padding:12px 28px;
    border-radius:999px;
    cursor:pointer;
    box-shadow:0 8px 22px -10px rgba(20,30,15,.55), inset 0 -1px 0 rgba(58,40,24,.08);
    transition:transform .25s var(--ease), box-shadow .25s var(--ease), background .25s var(--ease), color .25s var(--ease);
  }
  .cta::after{
    content:" →";
    font-family:var(--sans);
    transition:transform .3s var(--ease);
    display:inline-block;
    margin-left:3px;
  }
  .cta:hover{
    background:#fff;
    color:var(--leaf-deep);
    transform:translateY(-2px);
    box-shadow:0 12px 26px -10px rgba(20,30,15,.6);
  }
  .cta:hover::after{ transform:translateX(4px); }
  .skip{
    font-family:var(--mono);
    font-size:10.5px;
    letter-spacing:.2em;
    text-transform:uppercase;
    color:rgba(251,246,229,.72);
    background:none; border:none; cursor:pointer;
    text-decoration:underline; text-decoration-color:rgba(251,246,229,.4);
    text-underline-offset:4px;
    padding:3px 6px;
    transition:color .2s var(--ease), text-decoration-color .2s var(--ease);
  }
  .skip:hover{
    color:var(--cream);
    text-decoration-color:var(--cream);
  }

  /* Butterflies, closed-loop figure-eight wander, no teleport */
  .b{
    position:fixed; z-index:6; pointer-events:none;
    will-change:transform; opacity:.92;
  }
  .b-inner{
    width:100%; height:100%;
    transform-origin:50% 50%;
    animation:flap 1.0s ease-in-out infinite;
  }
  .b svg{width:100%;height:100%;display:block}
  .b1{
    width:38px; height:30px;
    top:22vh; left:8vw;
    animation:wander-b1 24s ease-in-out infinite;
  }
  .b1 .b-inner{ animation-duration:.85s }
  .b2{
    width:32px; height:26px;
    top:36vh; right:10vw;
    animation:wander-b2 28s ease-in-out infinite;
  }
  .b2 .b-inner{ animation-duration:1.1s }
  @keyframes flap{
    0%,100%{transform:scaleY(1)}
    50%{transform:scaleY(.55)}
  }
  /* closed loop: returns to 0,0, gentle figure-eight wander */
  @keyframes wander-b1{
    0%   { transform: translate3d(0vw, 0vh, 0); }
    15%  { transform: translate3d(6vw, -2vh, 0); }
    30%  { transform: translate3d(12vw, 1vh, 0); }
    45%  { transform: translate3d(8vw, 4vh, 0); }
    60%  { transform: translate3d(2vw, 2vh, 0); }
    75%  { transform: translate3d(-3vw, -1vh, 0); }
    90%  { transform: translate3d(-1vw, -3vh, 0); }
    100% { transform: translate3d(0vw, 0vh, 0); }
  }
  @keyframes wander-b2{
    0%   { transform: translate3d(0vw, 0vh, 0); }
    15%  { transform: translate3d(-7vw, 3vh, 0); }
    30%  { transform: translate3d(-14vw, -1vh, 0); }
    45%  { transform: translate3d(-9vw, -4vh, 0); }
    60%  { transform: translate3d(-2vw, -2vh, 0); }
    75%  { transform: translate3d(3vw, 1vh, 0); }
    90%  { transform: translate3d(1vw, 3vh, 0); }
    100% { transform: translate3d(0vw, 0vh, 0); }
  }

  /* CUSTOM CURSOR */
  @media (hover: hover) and (pointer: fine){
    body, body * { cursor: none !important; }
  }
  .cursor-dot{
    position:fixed; top:0; left:0; pointer-events:none; z-index:999;
    width:12px; height:12px; border-radius:50%;
    background:var(--accent);
    transform:translate(-50%, -50%);
    transition:width .3s var(--ease), height .3s var(--ease),
               background .2s var(--ease), opacity .2s var(--ease);
    will-change:transform;
  }
  body.cursor-grow .cursor-dot{ width:30px; height:30px; opacity:.85; }
  @media (hover: none){ .cursor-dot{ display:none; } }

    /* Falling petals */
  .petal{
    position:fixed; top:-30px; z-index:4; pointer-events:none;
    width:12px; height:12px; border-radius:60% 40% 70% 30%;
    opacity:.7;
    animation:fall linear infinite;
  }
  @keyframes fall{
    0%{transform:translate(0,-30px) rotate(0deg); opacity:0}
    10%{opacity:.7}
    100%{transform:translate(40px,108vh) rotate(540deg); opacity:0}
  }
  .p1{left:8%; background:#f4a8b6; animation-duration:18s; animation-delay:0s}
  .p2{left:22%; background:#d9b8e0; animation-duration:22s; animation-delay:3s; width:10px; height:10px}
  .p3{left:38%; background:#f6c97a; animation-duration:20s; animation-delay:7s}
  .p4{left:55%; background:#f4a8b6; animation-duration:24s; animation-delay:1.5s; width:9px; height:9px}
  .p5{left:72%; background:#cfd9b0; animation-duration:21s; animation-delay:5s}
  .p6{left:88%; background:#f6c97a; animation-duration:19s; animation-delay:9s; width:11px; height:11px}

  /* enter animations */
  .reveal{ opacity:0; transform:translateY(10px); animation:rise .9s var(--ease) forwards }
  .r1{animation-delay:.15s} .r2{animation-delay:.3s} .r3{animation-delay:.45s} .r4{animation-delay:.6s} .r5{animation-delay:.75s}
  @keyframes rise{to{opacity:1;transform:none}}

  @media (max-width:760px){
    .top{flex-basis:60vh; gap:10px; padding:0 5vw 40px}
    .bottom{padding:40px 5vw 0}
    .b1,.b2{display:none}
    .title{font-size:26px}
  }
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation:none !important;transition:none !important}
    .reveal{opacity:1;transform:none}
    /* Exit fallback, simple 250ms cross-fade instead of the multi-phase scene */
    .welcome.exiting{ opacity:0 !important; transition:opacity 250ms ease-out !important; }
    .cream-wash.blooming{ opacity:1 !important; transform:scale(3) !important; transition:opacity 250ms ease-out !important; }
  }
</style>
</head>
<body>

<div class="cursor-dot" aria-hidden="true"></div>

<!-- Cream wash, radial-gradient bloom anchored at the click point during exit -->
<div class="cream-wash" id="creamWash" aria-hidden="true"></div>

<!-- Welcome scene wrapper, SVG + page transform together as one unit -->
<section class="welcome" id="welcome">
<img id="sceneBg" class="scene-bg" alt="Watercolor garden scene" src="assets/garden-mb-v2.svg"/>

<div class="page" id="page">

  <!-- Falling petals -->
  <span class="petal p1"></span><span class="petal p2"></span><span class="petal p3"></span>
  <span class="petal p4"></span><span class="petal p5"></span><span class="petal p6"></span>

  <!-- Butterflies -->
  <div class="b b1" aria-hidden="true">
    <div class="b-inner">
      <svg viewBox="0 0 46 36" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="14" cy="14" rx="10" ry="9" fill="#f4a8b6" opacity=".95"/>
        <ellipse cx="32" cy="14" rx="10" ry="9" fill="#f4a8b6" opacity=".95"/>
        <ellipse cx="15" cy="24" rx="6" ry="5" fill="#ec6478" opacity=".9"/>
        <ellipse cx="31" cy="24" rx="6" ry="5" fill="#ec6478" opacity=".9"/>
        <ellipse cx="23" cy="18" rx="1.5" ry="9" fill="#5a3424"/>
        <circle cx="23" cy="9" r="1.5" fill="#5a3424"/>
      </svg>
    </div>
  </div>
  <div class="b b2" aria-hidden="true">
    <div class="b-inner">
      <svg viewBox="0 0 38 30" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="11" cy="11" rx="8" ry="7" fill="#cfb0e0" opacity=".95"/>
        <ellipse cx="27" cy="11" rx="8" ry="7" fill="#cfb0e0" opacity=".95"/>
        <ellipse cx="12" cy="20" rx="5" ry="4" fill="#a878c6" opacity=".9"/>
        <ellipse cx="26" cy="20" rx="5" ry="4" fill="#a878c6" opacity=".9"/>
        <ellipse cx="19" cy="15" rx="1.2" ry="7" fill="#3a2818"/>
        <circle cx="19" cy="8" r="1.2" fill="#3a2818"/>
      </svg>
    </div>
  </div>

  <!-- WORDMARK pill -->
  <a class="wordmark reveal r1" href="home.html" aria-label="Sakshi Shah home">
    <span class="dot" aria-hidden="true"></span>
    <span>sakshi shah</span>
  </a>

  <!-- SKY ZONE, eyebrow + title + tagline, vertically centered in the sky -->
  <header class="top">
    <p class="eyebrow reveal r1">welcome to</p>
    <h1 class="title reveal r2">
      Sakshi's Garden of <span class="serif">Growth</span>
    </h1>
    <p class="sub reveal r3">come on in to a small place where i build, design &amp; water ideas worth growing.</p>
  </header>

  <!-- GRASS ZONE, CTA + skip on the lawn -->
  <footer class="bottom">
    <div class="cta-row reveal r4">
      <button class="cta" id="enter">step inside</button>
      <button class="skip" id="skip">skip intro</button>
    </div>
  </footer>

</div>
</section>

<script>
  // Custom cursor tracking + grow on interactives
  (function(){
    var dot = document.querySelector('.cursor-dot');
    if(!dot) return;
    var x = window.innerWidth/2, y = window.innerHeight/2;
    var tx = x, ty = y;
    document.addEventListener('mousemove', function(e){ tx = e.clientX; ty = e.clientY; });
    function tick(){
      x += (tx - x) * .22;
      y += (ty - y) * .22;
      dot.style.transform = 'translate(' + x + 'px, ' + y + 'px) translate(-50%, -50%)';
      requestAnimationFrame(tick);
    }
    tick();
    document.querySelectorAll('a, button, .cta, .skip, .wordmark').forEach(function(el){
      el.addEventListener('mouseenter', function(){ document.body.classList.add('cursor-grow'); });
      el.addEventListener('mouseleave', function(){ document.body.classList.remove('cursor-grow'); });
    });
  })();

  // "Step inside" transition, 4-phase coordinated scene exit + cream-wash bloom from click point
  (function(){
    var enter=document.getElementById('enter');
    var skip=document.getElementById('skip');
    var welcome=document.getElementById('welcome');
    var wash=document.getElementById('creamWash');
    var prefersReduced=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    function go(e){
      // Anchor the cream-wash bloom at the click coordinates so it grows from where they tapped
      var x=(e&&e.clientX!==undefined)?e.clientX:innerWidth/2;
      var y=(e&&e.clientY!==undefined)?e.clientY:innerHeight*0.78;
      wash.style.transformOrigin=x+'px '+y+'px';
      // Trigger the unified scene exit + wash bloom, CSS keyframes do all the timing
      welcome.classList.add('exiting');
      wash.classList.add('blooming');
      // Navigate after total animation duration (250ms when reduced-motion is on)
      setTimeout(function(){ window.location.href='plant.html'; }, prefersReduced?250:1500);
    }
    function fast(){
      // Skip planting; go straight to the portfolio home
      try{localStorage.setItem('skipWelcome','1')}catch(e){}
      window.location.href='home.html';
    }
    enter.addEventListener('click', go);
    skip.addEventListener('click', fast);
  })();
</script>

</body>
</html>
